name: Publish Maven Central

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'codenameone/bluetoothle-codenameone'
    runs-on: ubuntu-latest

    env:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

    steps:
      - uses: actions/checkout@v4

      - name: Materialize GPG private key
        run: |
          rm -f /tmp/maven-signing-key.asc
          printf '%s' "$MAVEN_GPG_PRIVATE_KEY" > /tmp/maven-signing-key.raw

          if gpg --batch --import /tmp/maven-signing-key.raw >/tmp/gpg-import.log 2>&1; then
            cp /tmp/maven-signing-key.raw /tmp/maven-signing-key.asc
            exit 0
          fi

          if printf '%s' "$MAVEN_GPG_PRIVATE_KEY" | tr -d '\r\n\t ' | base64 --decode --ignore-garbage > /tmp/maven-signing-key.asc 2>/tmp/base64-decode.log; then
            if gpg --batch --import /tmp/maven-signing-key.asc >/tmp/gpg-import.log 2>&1; then
              exit 0
            fi
          fi

          echo "Unable to import MAVEN_GPG_PRIVATE_KEY as raw armored/binary data or as base64-encoded key material."
          echo "gpg import output:"
          sed -n '1,40p' /tmp/gpg-import.log || true
          echo "base64 decode output:"
          sed -n '1,40p' /tmp/base64-decode.log || true
          exit 1
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}

      - name: Set up Java 11 and Maven server credentials
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
          server-id: nexus-staging
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Setup Codename One Build Client
        run: |
          mkdir -p "$HOME/.codenameone"
          curl -fsSL "https://github.com/codenameone/CodenameOne/raw/refs/heads/master/maven/CodeNameOneBuildClient.jar" \
            -o "$HOME/.codenameone/CodeNameOneBuildClient.jar"

      - name: Verify version is a release version
        run: |
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "Project version: $VERSION"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "Publishing to Maven Central requires a non-SNAPSHOT version."
            exit 1
          fi

      - name: Deploy to Sonatype / Maven Central
        run: mvn -B -Psign-artifacts -Dgpg.passphrase="$MAVEN_GPG_PASSPHRASE" -pl common,android,ios,javascript,javase,win,lib -am -DskipTests deploy
